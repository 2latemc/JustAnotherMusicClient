name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.platform.name }} installers
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            os: windows-latest
            bundles: msi,nsis
            apple_signing_identity: ""
          - name: macOS
            os: macos-latest
            bundles: dmg
            apple_signing_identity: "-"
    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform.apple_signing_identity }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Just Another Music Client ${{ github.ref_name }}"
          releaseBody: |
            Desktop installers for Just Another Music Client.

            Windows: download the `.msi` or NSIS setup `.exe`.
            macOS: download the `.dmg`.

            The macOS build uses an ad-hoc signature. macOS may still require
            confirmation in Privacy & Security before opening it.
          releaseDraft: false
          prerelease: false
          args: --bundles ${{ matrix.platform.bundles }}

      - name: Verify macOS DMG and app signature
        if: matrix.platform.name == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          dmg_path="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$dmg_path"
          hdiutil verify "$dmg_path"

          mount_dir="$(mktemp -d)"
          cleanup() {
            hdiutil detach "$mount_dir" -quiet || true
            rmdir "$mount_dir" || true
          }
          trap cleanup EXIT

          hdiutil attach "$dmg_path" -readonly -nobrowse -mountpoint "$mount_dir"
          app_path="$(find "$mount_dir" -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"
