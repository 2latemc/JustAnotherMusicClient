name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.platform.name }} installers
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            os: windows-latest
            bundles: msi,nsis
          - name: macOS
            os: macos-latest
            bundles: app,dmg
    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Just Another Music Client ${{ github.ref_name }}"
          releaseBody: |
            Desktop installers for Just Another Music Client.

            Windows: download the `.msi` or NSIS setup `.exe`.
            macOS: download the `.dmg`.

            The macOS build is currently unsigned, so macOS may require
            confirmation before opening it.
          releaseDraft: false
          prerelease: false
          args: --bundles ${{ matrix.platform.bundles }}
